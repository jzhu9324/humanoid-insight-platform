name: Data Collection Workflow

on:
  schedule:
    - cron: '0 0 * * *'    # 每天00:00 UTC（北京时间08:00）- 日报 + 所有数据收集
    - cron: '0 12 * * *'   # 每天12:00 UTC（北京时间20:00）- 公司动态 + 微信文章

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Collect arXiv papers (每天00:00运行)
        # 只在每天00:00 UTC 或手动触发时运行
        if: github.event.schedule == '0 0 * * *' || github.event_name == 'workflow_dispatch'
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          echo "Collecting arXiv papers..."
          python scripts/collect_papers.py
        continue-on-error: true

      - name: Collect company news (每12小时更新)
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          echo "Collecting company news (每12小时更新)..."
          python scripts/collect_company_news.py
        continue-on-error: true

      - name: Collect WeChat articles (每12小时检查)
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          echo "Collecting WeChat articles (每12小时检查)..."
          python scripts/collect_wechat_articles.py
        continue-on-error: true

      - name: Generate daily report (每日生成)
        # 只在每天00:00 UTC 或手动触发时运行
        if: github.event.schedule == '0 0 * * *' || github.event_name == 'workflow_dispatch'
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          echo "Generating daily report..."
          python scripts/generate_report.py --type daily
        continue-on-error: true

      - name: Clean think tags from generated content
        run: |
          python3 - <<'EOF'
          import re
          from pathlib import Path

          docs_dir = Path("docs")
          pattern = re.compile(r'<think>.*?</think>', re.DOTALL)

          for md_file in docs_dir.rglob("*.md"):
              content = md_file.read_text(encoding='utf-8')
              cleaned = pattern.sub('', content).strip()
              if cleaned != content.strip():
                  md_file.write_text(cleaned + '\n', encoding='utf-8')
                  print(f"Cleaned: {md_file}")
          EOF

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Add all new content
          git add docs/ config/

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update data $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collection-logs
          path: logs/
          retention-days: 7
