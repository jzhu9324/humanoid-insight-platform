name: Data Collection Workflow

on:
  # Run daily at 00:00 UTC (8:00 AM Beijing time)
  schedule:
    - cron: '0 0 * * *'  # 每天运行（公司动态、微信文章）
    - cron: '0 0 * * 1,4'  # 每周一、四运行（论文收集）

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Collect arXiv papers (半周更新：每周一、周四)
        # 只在周一(1)和周四(4)运行
        if: github.event.schedule == '0 0 * * 1,4' || github.event_name == 'workflow_dispatch'
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          echo "Collecting arXiv papers (半周更新)..."
          python scripts/collect_papers.py
        continue-on-error: true

      - name: Collect company news (每日更新)
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          echo "Collecting company news (每日更新)..."
          python scripts/collect_company_news.py
        continue-on-error: true

      - name: Collect WeChat articles (每日检查)
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          echo "Collecting WeChat articles (每日检查)..."
          python scripts/collect_wechat_articles.py
        continue-on-error: true

      - name: Generate weekly report (每周日)
        # 只在周日(0)运行
        if: github.event.schedule == '0 0 * * 0' || github.event_name == 'workflow_dispatch'
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          echo "Generating weekly report..."
          python scripts/generate_report.py --type weekly
        continue-on-error: true

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Add all new content
          git add docs/ cache/ config/

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            # 生成更新说明
            UPDATE_MSG="chore: update data [skip ci]"
            if [ $(date +%u) -eq 1 ] || [ $(date +%u) -eq 4 ]; then
              UPDATE_MSG="${UPDATE_MSG}\n\n- Collected arXiv papers (半周更新)"
            fi
            UPDATE_MSG="${UPDATE_MSG}\n- Collected company news (每日更新)"
            UPDATE_MSG="${UPDATE_MSG}\n- Checked WeChat articles"
            if [ $(date +%u) -eq 0 ]; then
              UPDATE_MSG="${UPDATE_MSG}\n- Generated weekly report"
            fi
            UPDATE_MSG="${UPDATE_MSG}\n\nDate: $(date +'%Y-%m-%d %H:%M:%S')"

            git commit -m "$(echo -e \"${UPDATE_MSG}\")"
            git push
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collection-logs
          path: logs/
          retention-days: 7
